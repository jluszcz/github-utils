name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for setup-node
        type: string
        default: '22'

permissions:
  contents: read

jobs:
  build:
    name: Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: |
          npm run lint
          npm run format:check
